<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fitness Lion</title>
    <style>
        body {
            background-color: black;
            color: #f1c40f;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 80px;
            font-size: 70px;
        }

        p {
            color: white;
            font-size: 24px;
            margin-bottom: 50px;
        }

        .container {
            width: 600px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .btn {
            display: block;
            background-color: #e6c75a;
            color: black;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h1>Fitness Lion</h1>
    <p>Aplicación web para la gestión de usuarios, clases y reservas.</p>

    <div class="container">
        <a href="/registro" class="btn">Registrar usuario</a>
        <a href="/usuarios" class="btn">Ver usuarios</a>

        <a href="/clases" class="btn">Ver clases</a>
        <a href="/reservar" class="btn">Reservar clase</a>

        <a href="/login" class="btn">Iniciar sesión</a>
        <a href="/reservas" class="btn">Ver reservas</a>
    </div>

</body>
</html>
