<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reservas</title>
    <style>
        body {
            background-color: #000;
            color: #f1c40f;
            font-family: Arial;
            text-align: center;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            border: 1px solid #f1c40f;
            padding: 10px;
        }

        th {
            background-color: #f1c40f;
            color: black;
        }

        a {
            text-decoration: none;
        }

        .btn {
            background-color: #f1c40f;
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            display: inline-block;
        }

        .btn-cancelar {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>

<h1>Reservas realizadas</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Clase</th>
        <th>Acción</th>
    </tr>

    <tr th:each="reserva : ${reservas}">
        <td th:text="${reserva.id}"></td>
        <td th:text="${reserva.usuario.email}"></td>
        <td th:text="${reserva.clase.nombre}"></td>
        <td>
            <a th:href="@{'/cancelar-reserva/' + ${reserva.id}}" class="btn btn-cancelar">
                Cancelar
            </a>
        </td>
    </tr>
</table>

<br>

<a href="/" class="btn">Volver</a>

</body>
</html>
