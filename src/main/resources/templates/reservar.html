<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<style>
	    body {
	        margin: 0;
	        font-family: Arial, sans-serif;
	        background-color: #111;
	        color: white;
	        text-align: center;
	    }

	    h1 {
	        color: #f5c542;
	        margin-top: 40px;
	    }

	    table {
	        margin: 20px auto;
	        border-collapse: collapse;
	        width: 80%;
	        background-color: #222;
	    }

	    th, td {
	        border: 1px solid #444;
	        padding: 12px;
	        text-align: center;
	    }

	    th {
	        background-color: #f5c542;
	        color: black;
	    }

	    input, select {
	        padding: 10px;
	        margin: 10px;
	        border-radius: 8px;
	        border: none;
	        width: 250px;
	    }

	    button {
	        padding: 12px 20px;
	        background-color: #f5c542;
	        border: none;
	        border-radius: 10px;
	        font-size: 16px;
	        cursor: pointer;
	        font-weight: bold;
	    }

	    button:hover {
	        background-color: #ffd95e;
	    }

	    a {
	        display: inline-block;
	        margin-top: 20px;
	        color: #f5c542;
	        text-decoration: none;
	        font-weight: bold;
	    }

	    a:hover {
	        text-decoration: underline;
	    }
	</style>
<body>

<h1>Reservar clase</h1>

<form action="/reservar" method="post">

    <label>Usuario:</label>
    <select name="usuarioId">
        <option th:each="u : ${usuarios}" 
                th:value="${u.id}" 
                th:text="${u.email}">
        </option>
    </select>

    <br><br>

    <label>Clase:</label>
    <select name="claseId">
        <option th:each="c : ${clases}" 
                th:value="${c.id}" 
                th:text="${c.nombre}">
        </option>
    </select>

    <br><br>

    <button type="submit">Reservar</button>

</form>

<br>
<a href="/">Volver</a>

</body>
</html>
