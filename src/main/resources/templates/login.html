<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body {
            background-color: black;
            color: #f1c40f;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 80px;
            font-size: 60px;
        }

        .form-container {
            width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        .campo {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 20px;
            color: #f1c40f;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #e6c75a;
            color: black;
            font-size: 20px;
            padding: 14px 35px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 25px;
            color: #f1c40f;
            text-decoration: none;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Iniciar sesión</h1>

    <div class="form-container">
        <form action="/login" method="post">

            <div class="campo">
                <label>Email</label>
                <input type="text" name="email" required>
            </div>

            <div class="campo">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <a href="/">Volver</a>
    </div>

</body>
</html>
